name: Build Windows executable

# Builds a standalone single-file Windows .exe with PyInstaller.
#  - Manually from the Actions tab (Run workflow), or
#  - Automatically on a version tag (v*), which also attaches the exe to a
#    GitHub Release, or
#  - On pushes to the listed branches (so a build artifact is always available).
on:
  workflow_dispatch:
  push:
    branches: [main, feature/big-update]
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.6,<7"

      - name: Build standalone executable
        run: pyinstaller --noconfirm --clean SwimmingTinyWhale.spec

      - name: Smoke-test the executable (headless)
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist/SwimmingTinyWhale.exe" `
            -ArgumentList "--frames", "90" -PassThru -Wait
          if ($proc.ExitCode -ne 0) {
            throw "Executable exited with code $($proc.ExitCode)"
          }
          Write-Host "Executable launched headlessly and exited cleanly."

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwimmingTinyWhale-windows
          path: dist/SwimmingTinyWhale.exe
          if-no-files-found: error

      - name: Attach executable to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SwimmingTinyWhale.exe
